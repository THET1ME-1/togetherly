<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120">
  <!-- Body -->
  <rect x="26" y="78" width="48" height="42" rx="14" fill="#607D8B"/>
  <!-- Head -->
  <circle cx="50" cy="50" r="30" fill="#FFD5A8"/>
  <!-- Ears -->
  <circle cx="21" cy="52" r="7" fill="#FFD5A8"/>
  <circle cx="79" cy="52" r="7" fill="#FFD5A8"/>
  <circle cx="21" cy="52" r="4" fill="#FFBF8A"/>
  <circle cx="79" cy="52" r="4" fill="#FFBF8A"/>
  <!-- Hair -->
  <ellipse cx="50" cy="24" rx="26" ry="13" fill="#3E2314"/>
  <ellipse cx="26" cy="36" rx="7" ry="11" fill="#3E2314"/>
  <ellipse cx="74" cy="36" rx="7" ry="11" fill="#3E2314"/>
  <ellipse cx="50" cy="14" rx="8" ry="5" fill="#3E2314"/>
  <ellipse cx="38" cy="16" rx="6" ry="4" fill="#3E2314"/>
  <ellipse cx="62" cy="16" rx="6" ry="4" fill="#3E2314"/>
  <!-- Eyes white -->
  <ellipse cx="39" cy="49" rx="7" ry="7.5" fill="white"/>
  <ellipse cx="61" cy="49" rx="7" ry="7.5" fill="white"/>
  <!-- Eyes iris - looking down -->
  <circle cx="39" cy="53" r="4.5" fill="#4A2F1A"/>
  <circle cx="61" cy="53" r="4.5" fill="#4A2F1A"/>
  <circle cx="41" cy="51" r="1.8" fill="white"/>
  <circle cx="63" cy="51" r="1.8" fill="white"/>
  <!-- Eyebrows very sad -->
  <path d="M 30 38 Q 39 45 46 40" stroke="#3E2314" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 54 40 Q 61 45 70 38" stroke="#3E2314" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Nose -->
  <ellipse cx="50" cy="57" rx="3" ry="2" fill="#FFBF8A"/>
  <!-- Very sad mouth -->
  <path d="M 36 70 Q 50 57 64 70" stroke="#CC4444" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Two tears -->
  <path d="M 37 56 Q 34 63 37 67 Q 40 63 37 56" fill="#88CCEE"/>
  <path d="M 63 56 Q 66 63 63 67 Q 60 63 63 56" fill="#88CCEE"/>
  <!-- Dark circles -->
  <ellipse cx="39" cy="55" rx="8" ry="5" fill="#B0B0C8" opacity="0.25"/>
  <ellipse cx="61" cy="55" rx="8" ry="5" fill="#B0B0C8" opacity="0.25"/>
</svg>
