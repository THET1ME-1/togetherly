<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120">
  <!-- Body -->
  <rect x="26" y="78" width="48" height="42" rx="14" fill="#E87D9E"/>
  <!-- Long hair back -->
  <ellipse cx="50" cy="70" rx="34" ry="30" fill="#8B3A3A"/>
  <!-- Head -->
  <circle cx="50" cy="50" r="30" fill="#FFD5A8"/>
  <!-- Ears -->
  <circle cx="21" cy="52" r="7" fill="#FFD5A8"/>
  <circle cx="79" cy="52" r="7" fill="#FFD5A8"/>
  <circle cx="21" cy="52" r="4" fill="#FFBF8A"/>
  <circle cx="79" cy="52" r="4" fill="#FFBF8A"/>
  <!-- Hair top -->
  <ellipse cx="50" cy="24" rx="26" ry="13" fill="#8B3A3A"/>
  <ellipse cx="26" cy="36" rx="7" ry="14" fill="#8B3A3A"/>
  <ellipse cx="74" cy="36" rx="7" ry="14" fill="#8B3A3A"/>
  <!-- Hair bow (smaller, drooping) -->
  <path d="M 62 20 Q 72 14 74 22 Q 68 24 62 20" fill="#CC5580"/>
  <path d="M 62 20 Q 72 26 74 22 Q 68 20 62 20" fill="#AA3360"/>
  <circle cx="68" cy="20" r="3" fill="#CC5580"/>
  <!-- Eyes white -->
  <ellipse cx="39" cy="49" rx="7" ry="7.5" fill="white"/>
  <ellipse cx="61" cy="49" rx="7" ry="7.5" fill="white"/>
  <!-- Eyes iris - looking slightly down -->
  <circle cx="39" cy="51" r="4.5" fill="#6B3A5A"/>
  <circle cx="61" cy="51" r="4.5" fill="#6B3A5A"/>
  <circle cx="41" cy="49" r="1.8" fill="white"/>
  <circle cx="63" cy="49" r="1.8" fill="white"/>
  <!-- Eyelashes -->
  <line x1="33" y1="43" x2="31" y2="41" stroke="#3E2314" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="37" y1="41" x2="36" y2="39" stroke="#3E2314" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="55" y1="41" x2="54" y2="39" stroke="#3E2314" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="59" y1="43" x2="61" y2="41" stroke="#3E2314" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Eyebrows sad -->
  <path d="M 32 40 Q 39 43 46 40" stroke="#8B3A3A" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 54 40 Q 61 43 68 40" stroke="#8B3A3A" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Cheeks (paler) -->
  <ellipse cx="31" cy="58" rx="7" ry="5" fill="#FF9999" opacity="0.25"/>
  <ellipse cx="69" cy="58" rx="7" ry="5" fill="#FF9999" opacity="0.25"/>
  <!-- Nose -->
  <ellipse cx="50" cy="57" rx="3" ry="2" fill="#FFBF8A"/>
  <!-- Sad mouth -->
  <path d="M 38 68 Q 50 60 62 68" stroke="#CC4444" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Single tear -->
  <path d="M 39 57 Q 37 62 39 65 Q 41 62 39 57" fill="#88CCEE"/>
</svg>
