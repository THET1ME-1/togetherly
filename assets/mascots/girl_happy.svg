<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120">
  <!-- Body -->
  <rect x="26" y="78" width="48" height="42" rx="14" fill="#E87D9E"/>
  <!-- Collar bow detail -->
  <path d="M 40 78 L 50 88 L 60 78" fill="white" opacity="0.3"/>
  <!-- Long hair back -->
  <ellipse cx="50" cy="70" rx="34" ry="30" fill="#8B3A3A"/>
  <!-- Head -->
  <circle cx="50" cy="50" r="30" fill="#FFD5A8"/>
  <!-- Ears -->
  <circle cx="21" cy="52" r="7" fill="#FFD5A8"/>
  <circle cx="79" cy="52" r="7" fill="#FFD5A8"/>
  <circle cx="21" cy="52" r="4" fill="#FFBF8A"/>
  <circle cx="79" cy="52" r="4" fill="#FFBF8A"/>
  <!-- Hair top -->
  <ellipse cx="50" cy="24" rx="26" ry="13" fill="#8B3A3A"/>
  <ellipse cx="26" cy="36" rx="7" ry="14" fill="#8B3A3A"/>
  <ellipse cx="74" cy="36" rx="7" ry="14" fill="#8B3A3A"/>
  <!-- Hair bow -->
  <path d="M 62 18 Q 72 12 74 20 Q 68 22 62 18" fill="#FF6B9D"/>
  <path d="M 62 18 Q 72 24 74 20 Q 68 18 62 18" fill="#FF4488"/>
  <circle cx="68" cy="18" r="3" fill="#FF6B9D"/>
  <!-- Eyes white -->
  <ellipse cx="39" cy="49" rx="7" ry="7.5" fill="white"/>
  <ellipse cx="61" cy="49" rx="7" ry="7.5" fill="white"/>
  <!-- Eyes iris -->
  <circle cx="39" cy="50" r="4.5" fill="#6B3A5A"/>
  <circle cx="61" cy="50" r="4.5" fill="#6B3A5A"/>
  <circle cx="41" cy="48" r="1.8" fill="white"/>
  <circle cx="63" cy="48" r="1.8" fill="white"/>
  <!-- Eyelashes -->
  <line x1="33" y1="43" x2="31" y2="41" stroke="#3E2314" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="37" y1="41" x2="36" y2="39" stroke="#3E2314" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="55" y1="41" x2="54" y2="39" stroke="#3E2314" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="59" y1="43" x2="61" y2="41" stroke="#3E2314" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Eyebrows happy -->
  <path d="M 32 40 Q 39 37 46 40" stroke="#8B3A3A" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 54 40 Q 61 37 68 40" stroke="#8B3A3A" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Cheeks -->
  <ellipse cx="31" cy="58" rx="7" ry="5" fill="#FF9999" opacity="0.45"/>
  <ellipse cx="69" cy="58" rx="7" ry="5" fill="#FF9999" opacity="0.45"/>
  <!-- Nose -->
  <ellipse cx="50" cy="57" rx="3" ry="2" fill="#FFBF8A"/>
  <!-- Happy mouth -->
  <path d="M 37 63 Q 50 76 63 63" stroke="#CC4444" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 40 64 Q 50 72 60 64 L 60 68 Q 50 74 40 68 Z" fill="white" opacity="0.8"/>
</svg>
