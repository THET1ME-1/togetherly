<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Комната — Togetherly</title>
<meta name="robots" content="noindex">
<!-- Яндекс Диск отдаёт файл только тем, кто не представился чужим сайтом:
     с нашим Referer он отвечает 403. Заодно площадки перестают узнавать,
     откуда пришёл человек. -->
<meta name="referrer" content="no-referrer">
<meta name="theme-color" content="#150D0F">
<link rel="stylesheet" href="../landing.css">
<link rel="stylesheet" href="room.css">
<script>
/* В комнате смотрят кино, поэтому тёмная тема здесь по умолчанию: светлую
   получает только тот, кто выбрал её сам. */
(function () {
  try {
    document.documentElement.dataset.theme = localStorage.getItem('watch-theme') || 'dark';
  } catch (e) { document.documentElement.dataset.theme = 'dark'; }
})();
</script>
</head>
<body class="room-body">

<header class="top top--room">
  <a class="brand" href="../">
    <span class="brand__mark" aria-hidden="true"></span>
    <span class="brand__name">TOGETHERLY</span>
    <span class="brand__sub">watch</span>
  </a>
  <span class="status-line" id="status" data-i18n="room.connecting">Подключаюсь…</span>
  <div class="room-code">
    <span class="room-code__cap" data-i18n="room.code">Код комнаты</span>
    <b id="code">—</b>
  </div>
  <button class="btn btn--ghost btn--compact" id="copy" data-i18n-aria="room.copy">
    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 9h9v11H9zM6 15H4V4h11v2"/></svg>
    <span data-i18n="room.copy">Скопировать ссылку</span>
  </button>
  <button class="btn btn--ghost btn--compact btn--icon" id="share" data-i18n-aria="room.share" hidden>
    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 12v7a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-7M12 3v13M8 7l4-4 4 4"/></svg>
  </button>
  <button class="theme-btn" id="theme" data-i18n-aria="nav.theme" aria-pressed="true">
    <svg class="i-moon" viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 14.5A8.5 8.5 0 0 1 9.5 4a8.5 8.5 0 1 0 10.5 10.5z"/></svg>
    <svg class="i-sun" viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 3v2M12 19v2M3 12h2M19 12h2M5.6 5.6l1.4 1.4M17 17l1.4 1.4M18.4 5.6L17 7M7 17l-1.4 1.4"/></svg>
  </button>
</header>

<main class="stage-wrap" id="stage">
  <div class="player" id="player">
    <div class="player__empty">
      <svg viewBox="0 0 24 24" width="40" height="40" fill="currentColor"><path d="M8 5.5v13l11-6.5z"/></svg>
      <span data-i18n="room.empty">Вставьте ссылку на видео</span>
    </div>
  </div>

  <aside class="side">
    <div class="side__head">
      <h2 data-i18n="room.chat">Чат</h2>
      <span class="viewers" id="viewers" data-i18n="room.alone">вы один</span>
    </div>
    <div class="chat" id="chat"></div>
  </aside>

  <div class="manual" id="manual" hidden>
    <span class="manual__note" data-i18n="room.manualNote">Этим плеером управляет каждый сам: жмите вместе по отсчёту.</span>
    <button class="btn btn--ghost btn--compact" id="together" data-i18n="room.together">Начать вместе</button>
    <button class="btn btn--ghost btn--compact" id="pauseBoth" data-i18n="room.pauseBoth">Пауза у обоих</button>
  </div>

  <div class="source">
    <input id="link" class="source__input" autocomplete="off" spellcheck="false"
           data-i18n-ph="room.linkPlaceholder">
    <button class="btn btn--ghost btn--compact btn--icon" id="pick" data-i18n-aria="room.fileBtn">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 6h6l2 2h8v10H4zM9 12l5 3-5 3z"/></svg>
    </button>
    <input id="file" type="file" accept="video/*" hidden>
    <button class="btn btn--filled btn--compact" id="apply" data-i18n="room.play">Включить</button>
  </div>

  <div class="composer">
    <input id="message" class="input input--flat" autocomplete="off" data-i18n-ph="room.message">
    <button class="btn btn--filled btn--icon" id="send" data-i18n-aria="room.send">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M3 20l18-8L3 4v6l12 2-12 2z"/></svg>
    </button>
  </div>
</main>

<script src="../i18n.js"></script>
<script src="../theme.js"></script>
<script src="../vendor/centrifuge.js"></script>
<script src="https://www.youtube.com/iframe_api"></script>
<script src="room.js"></script>
</body>
</html>
